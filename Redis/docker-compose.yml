version: "3.9"

services:
  redis:
    image: redis:latest
    container_name: redis-solarmboa
    ports:
      - "6379:6379"
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    networks:
      - solarmboa-redis 