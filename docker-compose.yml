version: '3.9'
services:
  cassandra-node1: # Premier nœud (seed)
    image: cassandra:4.1
    container_name: cassandra-node1
    hostname: cassandra-node1
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: SolarMboa
      CASSANDRA_DC: Cameroun
      CASSANDRA_RACK: Rack1
      CASSANDRA_SEEDS: cassandra-node1
      MAX_HEAP_SIZE: 1G      # Limite la RAM de Java à 512 Mo
      HEAP_NEWSIZE: 200M       # Taille de la zone jeune de Java
    volumes:
      - cass1-data:/var/lib/cassandra
    networks:
      - solarmboa-cassandra
    healthcheck:
      test: ["CMD", "nodetool", "status"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s 

  cassandra-node2: # Deuxième nœud
    image: cassandra:4.1
    container_name: cassandra-node2
    hostname: cassandra-node2
    environment:
      CASSANDRA_CLUSTER_NAME: SolarMboa
      CASSANDRA_DC: Cameroun
      CASSANDRA_RACK: Rack1
      CASSANDRA_SEEDS: cassandra-node1 # Pointe vers le seed
      MAX_HEAP_SIZE: 1G      # Limite la RAM de Java à 512 Mo
      HEAP_NEWSIZE: 200M       # Taille de la zone jeune de Java
    volumes:
      - cass2-data:/var/lib/cassandra
    networks:
      - solarmboa-cassandra
    depends_on:
      cassandra-node1:
        condition: service_healthy

  cassandra-node3: # Troisième nœud
    image: cassandra:4.1
    container_name: cassandra-node3
    hostname: cassandra-node3
    environment:
      CASSANDRA_CLUSTER_NAME: SolarMboa
      CASSANDRA_DC: Cameroun
      CASSANDRA_RACK: Rack1
      CASSANDRA_SEEDS: cassandra-node1
      MAX_HEAP_SIZE: 1G      # Limite la RAM de Java à 512 Mo
      HEAP_NEWSIZE: 200M       # Taille de la zone jeune de Java
    volumes:
      - cass3-data:/var/lib/cassandra
    networks:
      - solarmboa-cassandra
    depends_on:
      cassandra-node1:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: redis-solarmboa
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes # Sauvegarde les données sur le disque
    networks:
      - solarmboa-cassandra # On le met sur le même réseau pour qu'il puisse parler à Cassandra si besoin
    deploy:
      resources:
        limits:
          memory: 256M     # Redis est très léger, 256Mo lui suffisent amplement   



volumes:
  cass1-data: {}
  cass2-data: {}
  cass3-data: {}
  redis-data: {}
  # mongo-data: {}

networks:
  solarmboa-cassandra:
    driver: bridge # Cette option est valide en version 3.9.
