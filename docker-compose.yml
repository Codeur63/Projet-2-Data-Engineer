  redis:
    image: redis:7-alpine
    container_name: solarmboa-redis
    hostname: redis
    # restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./Redis/redis.conf:/usr/local/etc/redis/redis.conf:ro 
      - redis-data:/data
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    mem_limit: 256m
    cpus: 0.50
    networks:
      - solarmboa-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M  

